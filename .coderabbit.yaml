language: ko-KR
tone_instructions: "핵심 문제를 우선 지적하고, 사소한 스타일 지적은 줄여주세요."

reviews:
  profile: assertive
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  review_status: true
  review_details: false
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: false
  suggested_reviewers: false
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "develop"

  path_filters:
    - "!**/build/**"
    - "!**/dist/**"
    - "!**/*.log"
    - "!**/*.tmp"
    - "!**/*.out"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.pdf"

  path_instructions:
    - path: "src/**/*.c"
      instructions: |
        다음 항목을 우선적으로 검토해주세요.
        1. 동시성 안전성: race condition, lock 범위, unlock 누락, deadlock 가능성
        2. 상태 변경 원자성: buy/sell 같은 변경 요청이 all-or-nothing 인지
        3. 응답-상태 일치: success 응답이 실제 commit된 상태를 반영하는지
        4. durability/recovery: fsync, rename, manifest 갱신 순서가 안전한지
        5. partial failure 처리: 로그 쓰기 실패, snapshot 실패, recover 실패 시 rollback/중단이 올바른지
        6. 에러 처리와 자원 정리: file descriptor, mutex, memory leak, early return cleanup 누락 여부
        스타일보다 correctness, persistence, recovery 버그를 우선 지적해주세요.

    - path: "src/**/*.h"
      instructions: |
        함수 계약(contract), ownership, thread-safety, error code 의미가 명확한지 검토해주세요.
        선언과 실제 구현의 의미가 어긋나면 지적해주세요.

    - path: "docs/**/*.md"
      instructions: |
        문서가 실제 코드와 일치하는지 검토해주세요.
        특히 recovery 절차, manifest 역할, snapshot/AOF 순서, baseline 범위 설명이 코드와 다르면 지적해주세요.

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
      - "**/.cursorrules"

  learnings:
    scope: local

issue_enrichment:
  auto_enrich:
    enabled: true

  planning:
    enabled: true

  auto_planning:
    enabled: true
    labels:
      - "feature"
      - "enhancement"
      - "refactor"

  labeling:
    auto_apply_labels: false
    labeling_instructions:
      - label: "bug"
        instructions: "재현 가능한 오동작, crash, data corruption, invariant 위반"
      - label: "feature"
        instructions: "새 기능 추가 또는 사용자에게 보이는 기능 확장"
      - label: "refactor"
        instructions: "동작 변경 없이 구조 개선, 모듈 분리, 가독성/유지보수성 개선"
      - label: "docs"
        instructions: "문서 추가 또는 수정"
      - label: "test"
        instructions: "테스트 추가, 보강, 수정"
