name: Refactor / Task
description: 동작 변경 없는 구조 개선, 모듈 분리, 유지보수 작업
title: "[REFACTOR] "
labels: ["refactor", "needs-triage"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: 목적
      description: 왜 이 리팩터링이 필요한지 적어주세요.
      placeholder: "예: stockserver.c가 너무 커서 protocol / persistence / threadpool 분리가 필요함"
    validations:
      required: true

  - type: textarea
    id: current_state
    attributes:
      label: 현재 상태
      description: 현재 구조나 문제점을 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: target_state
    attributes:
      label: 목표 상태
      description: 리팩터링 후 어떤 구조가 되어야 하는지 적어주세요.
      placeholder: |
        - protocol
        - stockstore
        - persistence
        - threadpool
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: 비목표
      description: 이번 작업에서 하지 않을 것을 적어주세요.
      placeholder: "예: 성능 최적화는 이번 범위에서 제외"

  - type: textarea
    id: checklist
    attributes:
      label: 작업 항목
      description: 쪼갠 작업 단위를 적어주세요.
      placeholder: |
        - [ ] 헤더 분리
        - [ ] 구현 파일 분리
        - [ ] 기존 테스트 유지
        - [ ] 문서 갱신
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: 안전성 체크
      options:
        - label: 외부 동작 변화 없음
        - label: 에러 코드/계약 유지
        - label: 테스트 추가 또는 기존 테스트 통과
        - label: 문서 동기화 필요
